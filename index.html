  <title>万象魔方</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"JetBrains Mono"', '"Noto Sans SC"', 'monospace'],
          },
          colors: {
            hud: {
              black: '#050a14',
              dark: '#0a1120',
              border: '#1e293b',
              blue: '#1d4ed8',
              cyan: '#06b6d4',
              text: '#94a3b8',
              active: '#e2e8f0'
            }
          },
          backgroundImage: {
            'grid-pattern': "linear-gradient(to right, #1e293b 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px)",
          }
        }
      }
    }
  </script>
  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(143, 174, 192, 0.22), transparent 34%),
        radial-gradient(circle at right 18%, rgba(232, 205, 178, 0.24), transparent 28%),
        linear-gradient(180deg, #fbf7f2 0%, #f3efe8 100%);
      color: #24303c;
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(117, 130, 150, 0.08);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(94, 127, 161, 0.22);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(94, 127, 161, 0.38);
    }
  </style>
